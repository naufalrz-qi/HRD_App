{% extends "base.html" %}

{% block page_title %}Tambah Kontak Reminder{% endblock %}
{% block breadcrumb %}Kelola / Reminder / Tambah{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-bottom: 1.5rem;">Tambah Kontak Reminder</h2>
    
    <form action="{{ url_for('admin.add_reminder') }}" method="POST">
        <div class="form-group">
            <label class="form-label">Tautkan ke Karyawan (Opsional)</label>
            <select name="employee_id" class="form-control">
                <option value="">-- Pilih Karyawan --</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}">{{ emp.nama }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">Nama (Bila tidak ditautkan)</label>
            <input type="text" name="nama" class="form-control">
        </div>
        
        <div class="form-group">
            <label class="form-label">Nomor WhatsApp (Gunakan +62...)</label>
            <input type="text" name="nomor_telepon" class="form-control" required placeholder="+628123456789">
        </div>
        
        <div class="form-group">
            <label class="form-label">Kategori (Label)</label>
            <input type="text" name="kategori" class="form-control" placeholder="Contoh: HRD, Admin, Karyawan">
            <small class="text-muted">Gunakan label "HRD" untuk reminder ulang tahun yang akan dikirim ke HRD.</small>
        </div>
        
        <div class="flex gap-2" style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Simpan</button>
            <a href="{{ url_for('admin.manage_reminders') }}" class="btn btn-outline">Batal</a>
        </div>
    </form>
</div>
{% endblock %}
