{% extends 'base.html' %}

{% block page_title %}Tambah Karyawan{% endblock %}
{% block breadcrumb %}Data Master / Karyawan / Tambah{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2>Tambah Karyawan Baru</h2>
    
    <form method="POST" action="{{ url_for('employee_controller.create') }}">
        <div class="grid grid-cols-2" style="gap: 1rem;">
            <div class="form-group">
                <label class="form-label" for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email (Untuk Login)</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="divisi">Divisi</label>
                <input type="text" id="divisi" name="divisi" class="form-control">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="jabatan">Jabatan</label>
                <input type="text" id="jabatan" name="jabatan" class="form-control">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="jabatan_2">Jabatan 2</label>
                <input type="text" id="jabatan_2" name="jabatan_2" class="form-control">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="tanggal_lahir">Tanggal Lahir (Untuk Password Default)</label>
                <input type="date" id="tanggal_lahir" name="tanggal_lahir" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="tanggal_mulai_bekerja">Tanggal Mulai Bekerja</label>
                <input type="date" id="tanggal_mulai_bekerja" name="tanggal_mulai_bekerja" class="form-control">
            </div>
        </div>
        
        <div class="flex gap-2" style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary">Simpan Karyawan</button>
            <a href="{{ url_for('employee_controller.index') }}" class="btn btn-outline">Batal</a>
        </div>
    </form>
</div>
{% endblock %}
