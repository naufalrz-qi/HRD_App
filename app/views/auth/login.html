{% extends 'base.html' %}

{% block auth_content %}
<div class="login-layout">
    <div class="login-hero">
        <div class="login-hero-content">
            <div class="login-hero-icon">💼</div>
            <h1>Arunika</h1>
            <p>Sistem manajemen sumber daya manusia terpadu untuk pengelolaan karyawan, cuti, dan kontrak.</p>
        </div>
    </div>
    <div class="login-form-side">
        <div class="login-card">
            <h2>Masuk ke Akun</h2>
            <p class="subtitle">Masukkan kredensial Anda untuk melanjutkan.</p>

            <form method="POST" action="{{ url_for('auth_controller.login') }}">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="nama@perusahaan.com" required autofocus>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg btn-block mt-4">Masuk</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
